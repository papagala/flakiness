{{- if and .Values.flakyDeployment.enabled .Values.flakyDeployment.gateway.enabled }}
{{- $gw := .Values.flakyDeployment.gateway }}
{{- if $gw.createGatewayClass }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ $gw.gatewayClassName }}
  labels:
    {{- include "flakiness.labels" . | nindent 4 }}
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.flakyDeployment.name }}-gateway
  labels:
    {{- include "flakiness.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ $gw.gatewayClassName }}
  listeners:
    - name: http
      protocol: HTTP
      port: {{ $gw.listenerPort }}
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.flakyDeployment.name }}-route
  labels:
    {{- include "flakiness.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.flakyDeployment.name }}-gateway
  {{- with $gw.hostname }}
  hostnames:
    - {{ . | quote }}
  {{- end }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.flakyDeployment.name }}
          port: {{ .Values.flakyDeployment.servicePort }}
{{- if $gw.retry.enabled }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ .Values.flakyDeployment.name }}-retry
  labels:
    {{- include "flakiness.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ .Values.flakyDeployment.name }}-route
  retry:
    numRetries: {{ $gw.retry.numRetries }}
    retryOn:
      httpStatusCodes:
        {{- range $gw.retry.statusCodes }}
        - {{ . }}
        {{- end }}
      triggers:
        {{- range $gw.retry.triggers }}
        - {{ . }}
        {{- end }}
    perRetry:
      timeout: {{ $gw.retry.perRetryTimeout | quote }}
      backOff:
        baseInterval: {{ $gw.retry.backOff.baseInterval | quote }}
        maxInterval: {{ $gw.retry.backOff.maxInterval | quote }}
{{- end }}
{{- end }}
