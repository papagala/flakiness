{{- if .Values.flakyDeployment.enabled }}
{{- $pct := include "flakiness.percentage" (dict "component" .Values.flakyDeployment "root" .) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.flakyDeployment.name }}
  labels:
    app: {{ .Values.flakyDeployment.name }}
    {{- include "flakiness.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.flakyDeployment.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.flakyDeployment.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.flakyDeployment.name }}
      {{- with .Values.flakyDeployment.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: flaky
          image: {{ include "flakiness.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--percentage-of-failures"
            - "{{ $pct }}"
            - "--port"
            - "{{ .Values.containerPort }}"
            - "--model-name"
            - "{{ .Values.flakyDeployment.name }}"
          ports:
            - containerPort: {{ .Values.containerPort }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.flakyDeployment.name }}
  labels:
    app: {{ .Values.flakyDeployment.name }}
    {{- include "flakiness.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ .Values.flakyDeployment.name }}
  ports:
    - port: {{ .Values.flakyDeployment.servicePort }}
      targetPort: {{ .Values.containerPort }}
{{- end }}
